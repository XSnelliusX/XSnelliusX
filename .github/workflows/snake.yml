name: Generate snake animation

on:
  schedule:
    - cron: "27 4 * * *"   # daily, 04:27 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/snake.yml"]

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake from contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: XSnelliusX
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd7ff,#3a86ff,#1e60c8,#0b3a8c,#062561

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
