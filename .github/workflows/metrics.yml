# NOTE: METRICS_TOKEN must be a *classic* personal access token with
#       scopes: repo, read:user, read:org
# Fine-grained PATs are not (yet) supported by lowlighter/metrics for the
# GitHub GraphQL API and will fail with an explicit error in the action log.

name: Generate metrics.svg

on:
  schedule:
    - cron: "13 4 * * *"   # daily, 04:13 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/metrics.yml"]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Personal metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: XSnelliusX
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Taipei
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, scss, makefile, dockerfile, jupyter notebook, tex
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 12
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_notable: yes
          plugin_notable_indepth: yes
          plugin_notable_types: commit
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_followup: yes
          plugin_followup_sections: repositories
